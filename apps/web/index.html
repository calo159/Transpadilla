<html lang="es">
  <head>
    <meta charset="UTF-8" />

    <meta name="description" content="Sistema de rastreo de transporte público en tiempo real — Riohacha, La Guajira. Moviendo la Ciudad." />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TransPadilla" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:title" content="TransPadilla — Transporte Público Riohacha" />
    <meta property="og:description" content="Rastrea buses en tiempo real en Riohacha, La Guajira. Moviendo la Ciudad." />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TransPadilla — Transporte Público Riohacha" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  </head>
  <body>
    <div id="root">
      <!-- Splash de carga: se muestra hasta que React monta la app (evita pantalla en blanco). -->
      <div id="tp-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:radial-gradient(ellipse at 50% -10%, #1757C2 0%, #0D2461 35%, #080D18 70%);font-family:Inter,system-ui,sans-serif;">
        <img src="/logo-transpadilla.png" alt="TransPadilla" width="84" height="84" style="border-radius:18px;box-shadow:0 8px 30px rgba(0,0,0,.4)" />
        <div style="font-size:22px;font-weight:900;letter-spacing:.12em;color:#fff">Trans<span style="color:#F5C200">Padilla</span></div>
        <div style="width:34px;height:34px;border:3px solid rgba(255,255,255,.25);border-top-color:#4BA9D8;border-radius:50%;animation:tp-spin .8s linear infinite"></div>
        <style>@keyframes tp-spin{to{transform:rotate(360deg)}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
