<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TransPadilla — Moviendo la Ciudad</title>
    <meta name="description" content="Sistema de rastreo de transporte público en tiempo real — Riohacha, La Guajira. Moviendo la Ciudad." />
    <meta name="theme-color" content="#0D2461" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="TransPadilla" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta property="og:title" content="TransPadilla — Transporte Público Riohacha" />
    <meta property="og:description" content="Rastrea buses en tiempo real en Riohacha, La Guajira. Moviendo la Ciudad." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/opengraph.jpg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TransPadilla — Transporte Público Riohacha" />
    <meta name="twitter:description" content="Rastrea buses en tiempo real en Riohacha, La Guajira." />
    <meta name="twitter:image" content="/opengraph.jpg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root">
      <!-- Splash de carga: se muestra hasta que React monta la app (evita pantalla en blanco). -->
      <div id="tp-splash" style="position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:linear-gradient(135deg, #24487e 0%, #1B3B6F 60%, #16335f 100%);font-family:Inter,system-ui,sans-serif;">
        <div style="width:84px;height:84px;border-radius:9999px;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 30px rgba(0,0,0,.35), 0 0 0 1px rgba(255,255,255,.08);overflow:hidden">
          <img src="/logo-transpadilla.png" alt="TransPadilla" width="84" height="84" style="width:100%;height:100%;object-fit:cover" />
        </div>
        <div style="font-size:22px;font-weight:900;letter-spacing:.12em;color:#fff">Trans<span style="color:#F5B731">Padilla</span></div>
        <div style="width:34px;height:34px;border:3px solid rgba(255,255,255,.25);border-top-color:#7BB8D5;border-radius:50%;animation:tp-spin .8s linear infinite"></div>
        <style>@keyframes tp-spin{to{transform:rotate(360deg)}}@media (prefers-reduced-motion:reduce){#tp-splash div[style*="tp-spin"]{animation:none!important}}</style>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
