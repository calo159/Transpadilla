# ============================================================================
#  TransPadilla — Render Blueprint (Infrastructure as Code)
#  Despliega TODO el sistema en Render con un solo archivo:
#    1. transpadilla-web      → Node (API Express + Socket.IO + frontend React)
#    2. transpadilla-trafico  → Django (microservicio de tráfico)
#    3. transpadilla-db       → PostgreSQL gestionado (compartido por ambos)
#
#  Cómo usar:
#    1. Sube este repo a GitHub.
#    2. En Render: New → Blueprint → conecta el repo → Apply.
#    3. Render crea los 3 recursos y los enlaza automáticamente.
#    4. ÚNICO paso manual: copia la URL pública del servicio
#       "transpadilla-trafico" (https://transpadilla-trafico.onrender.com)
#       y pégala en la variable TRAFICO_URL del servicio "transpadilla-web".
#       (Está marcada como sync:false justamente para que la pegues tú.)
# ============================================================================

databases:
  - name: transpadilla-db
    databaseName: transpadilla
    plan: free

services:
  # ──────────────────────────────────────────────────────────────────────────
  #  Servicio principal: API + Socket.IO + frontend (un solo dominio)
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: transpadilla-web
    runtime: node
    plan: free
    region: oregon
    # --prod=false fuerza instalar tambien las devDependencies (vite, esbuild…),
    # que NODE_ENV=production omitiria; se necesitan para construir frontend+API.
    buildCommand: pnpm install --no-frozen-lockfile --prod=false && pnpm run build:prod
    startCommand: pnpm --filter @workspace/api start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: transpadilla-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SEED_ON_START
        value: "true"
      # ── Modo de datos iniciales (SEGURO POR DEFECTO) ──
      # SEED_DEMO="false": la base arranca LIMPIA, sin datos demo ni cuentas de
      # prueba. Se crea ÚNICAMENTE el administrador definido en ADMIN_EMAIL /
      # ADMIN_PASSWORD. Esto evita publicar un admin con contraseña conocida
      # (admin123) en el sitio en producción.
      # Para una demo desechable con datos de ejemplo, cambia SEED_DEMO a "true".
      - key: SEED_DEMO
        value: "false"
      # Render te pedirá estos valores al desplegar (sync:false = no van en el repo).
      # Usa una contraseña larga y única para el administrador.
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      # URL publica del microservicio Django. Nota: fromService 'property: host'
      # devuelve solo el nombre corto ("transpadilla-trafico"), no resoluble; por
      # eso usamos la URL publica completa, que el proxy alcanza por HTTPS.
      - key: TRAFICO_URL
        value: https://transpadilla-trafico.onrender.com

  # ──────────────────────────────────────────────────────────────────────────
  #  Microservicio de tráfico (Django + Gunicorn)
  # ──────────────────────────────────────────────────────────────────────────
  - type: web
    name: transpadilla-trafico
    runtime: python
    plan: free
    region: oregon
    rootDir: services/trafico
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn trafico_config.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: transpadilla-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      # Django acepta cualquier subdominio de onrender.com (prefijo con punto).
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: PYTHON_VERSION
        value: "3.12.6"
