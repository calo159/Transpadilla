# ============================================================================
#  TransPadilla — Auto-hospedaje en un solo servidor (VPS) con Docker Compose
#  Alternativa económica a Render: todo corre en un único VPS (~US$6–12/mes).
#  Levanta base de datos + web (Node: API + Socket.IO + frontend).
#
#  Uso:
#    1. Copia .env.example a .env y completa los valores (¡secretos fuertes!).
#    2. docker compose up -d --build
#    3. Apunta tu dominio al VPS y pon un proxy con HTTPS (Caddy/Nginx) delante.
# ============================================================================

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:-transpadilla}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "8080"
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-transpadilla}
      JWT_SECRET: ${JWT_SECRET:?define JWT_SECRET en .env}
      # Producción real: descomenta para arrancar sin datos demo.
      # SEED_DEMO: "false"
      # ADMIN_EMAIL: ${ADMIN_EMAIL}
      # ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    # La imagen node:24-slim no trae curl/wget; se usa el propio Node para golpear
    # /api/healthz (el mismo path que ya usa Render como healthCheckPath).
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:8080/api/healthz', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
