kind = "web"
previewPath = "/"
title = "TRANSPADILLA"
version = "1.0.0"
id = "artifacts/transpadilla"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26134

[services.development]
run = "pnpm --filter @workspace/transpadilla run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/transpadilla", "run", "build" ]
publicDir = "artifacts/transpadilla/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26134"
BASE_PATH = "/"
