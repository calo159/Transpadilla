name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: transpadilla
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/transpadilla
      JWT_SECRET: ci-secret-no-usar-en-produccion
      SEED_DEMO: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Habilitar pnpm (corepack)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Instalar dependencias
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build de producción
        run: pnpm run build:prod

      - name: Tests
        run: pnpm run test

      - name: Auditoría de seguridad
        run: pnpm audit --prod
